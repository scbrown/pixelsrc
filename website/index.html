<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixelsrc - Pixel Art Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div id="loading-overlay" role="dialog" aria-modal="true" aria-labelledby="loading-title" aria-describedby="loading-status">
      <div class="loading-content">
        <div class="loading-logo">
          <span class="pixel-icon" aria-hidden="true">▣</span>
          <span id="loading-title" class="loading-title">Pixelsrc</span>
        </div>
        <div class="loading-spinner" role="progressbar" aria-label="Loading application"></div>
        <p id="loading-status" class="loading-text" aria-live="polite">Initializing...</p>
      </div>
    </div>

    <div id="app">
      <header id="header">
        <h1>Pixelsrc</h1>
        <p class="tagline">GenAI-native pixel art format</p>
      </header>

      <main id="main">
        <section id="editor-panel" class="panel" aria-labelledby="editor-heading">
          <div class="panel-header">
            <h2 id="editor-heading">Editor</h2>
          </div>
          <div class="panel-content">
            <label for="editor" class="visually-hidden">JSONL code editor - enter Pixelsrc sprite definitions</label>
            <textarea id="editor" placeholder="Enter your Pixelsrc JSONL here..." aria-describedby="editor-hint"></textarea>
            <span id="editor-hint" class="visually-hidden">Press Ctrl+Enter or Cmd+Enter to render the sprite</span>
          </div>
        </section>

        <section id="preview-panel" class="panel" aria-labelledby="preview-heading">
          <div class="panel-header">
            <h2 id="preview-heading">Preview</h2>
            <div class="preview-controls">
              <button id="render-btn" type="button" aria-keyshortcuts="Control+Enter Meta+Enter">Render</button>
              <div id="export-controls"></div>
            </div>
          </div>
          <div class="panel-content preview-content">
            <div id="preview-canvas" role="img" aria-label="Rendered sprite preview"></div>
            <div id="preview-error" class="error hidden" role="alert" aria-live="assertive"></div>
            <div id="preview-status" class="preview-status hidden" role="status" aria-live="polite">
              <span class="status-icon" aria-hidden="true"></span>
              <span class="status-text"></span>
            </div>
          </div>
        </section>
      </main>

      <section id="gallery-panel" class="panel" aria-labelledby="gallery-heading">
        <div class="panel-header">
          <h2 id="gallery-heading">Gallery</h2>
        </div>
        <div class="panel-content">
          <div id="gallery" class="gallery-grid" role="group" aria-label="Example sprites"></div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
